<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C'oodiee TKJ Toolbox</title>
    <style>
        /* CSS3 UNTUK STATISTIK GITHUB */
        :root {
            --glow: #58a6ff;
            --dark-bg: #010409;
            --card-bg: #0d1117;
            --tkj-green: #3fb950;
        }

        body {
            background-color: var(--dark-bg);
            color: #c9d1d9;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .main-card {
            background: var(--card-bg);
            border: 2px solid #30363d;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }

        h1 { color: var(--glow); text-align: center; font-size: 1.5rem; }

        .input-box {
            background: #161b22;
            border: 1px solid var(--glow);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--glow);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--tkj-green);
            transform: scale(1.02);
        }

        #result-area {
            margin-top: 25px;
            padding: 15px;
            border-left: 4px solid var(--tkj-green);
            background: #161b22;
            min-height: 100px;
            font-size: 14px;
            line-height: 1.6;
        }

        .signature {
            margin-top: 20px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>[ C'OODIEE NETWORK TOOLBOX ]</h1>
        <p style="text-align: center; font-size: 12px;">TKJ Professional Analyzer v2.0</p>
        
        <div class="input-box">
            <input type="text" id="ipInput" placeholder="Masukkan IP (Contoh: 192.168.1.1)">
        </div>

        <button onclick="analyzeIP()">GAS ANALISIS!</button>

        <div id="result-area">
            > Menunggu input IP Address...
        </div>
    </div>

    <div class="signature">© 2026 C'oodiee. Signature Style Text</div>

    <script>
        /* JAVASCRIPT UNTUK STATISTIK GITHUB */
        function analyzeIP() {
            const ip = document.getElementById('ipInput').value;
            const res = document.getElementById('result-area');
            
            if(!ip) {
                res.innerHTML = "<span style='color: #f85149'>> Error: IP Kosong, Man!</span>";
                return;
            }

            res.innerHTML = "> Memproses algoritma jaringan...";

            setTimeout(() => {
                const firstOctet = parseInt(ip.split('.')[0]);
                let ipClass = "Unknown";
                let subnet = "Unknown";

                if (firstOctet >= 1 && firstOctet <= 126) {
                    ipClass = "A"; subnet = "255.0.0.0";
                } else if (firstOctet >= 128 && firstOctet <= 191) {
                    ipClass = "B"; subnet = "255.255.0.0";
                } else if (firstOctet >= 192 && firstOctet <= 223) {
                    ipClass = "C"; subnet = "255.255.255.0";
                }

                res.innerHTML = `
                    <span style='color: #3fb950'>> ANALISIS SELESAI:</span><br>
                    - IP Address : ${ip}<br>
                    - Kelas IP   : Kelas ${ipClass}<br>
                    - Subnet Mask: ${subnet}<br>
                    - Status     : Network Active
                `;
            }, 1000);
        }
    </script>
</body>
</html>
