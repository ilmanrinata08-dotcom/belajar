<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C'oodiee Terminal | TKJ Dashboard</title>
    
    <style>
        :root {
            --primary: #58a6ff;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --success: #3fb950;
        }

        body {
            background-color: var(--bg);
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 22px; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #8b949e; margin-bottom: 20px; }

        .input-group { margin: 20px 0; }

        input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #2ea043; }

        #console {
            margin-top: 20px;
            padding: 15px;
            background: #010409;
            border-radius: 6px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-left: 3px solid var(--primary);
            min-height: 50px;
        }

        .loading { color: var(--primary); }
        .done { color: var(--success); }
    </style>
</head>
<body>

    <div class="container">
        <h1>C'OODIEE TECH TERMINAL</h1>
        <p class="subtitle">SMK TKJ | Networking & Python Developer</p>

        <div class="input-group">
            <input type="text" id="targetIp" placeholder="Masukkan IP (cth: 192.168.1.1)">
            <button onclick="startAudit()">JALANKAN AUDIT JARINGAN</button>
        </div>

        <div id="console">
            <span class="loading">> Sistem Sedia. Sila masukkan IP...</span>
        </div>
    </div>

    <script>
        function startAudit() {
            const ip = document.getElementById('targetIp').value;
            const log = document.getElementById('console');

            if (!ip) {
                log.innerHTML = "<span style='color: #f85149'>> Ralat: IP diperlukan!</span>";
                return;
            }

            log.innerHTML = `<span class="loading">> Menghubungi ${ip}...</span>`;
            
            // Simulasi proses teknikal agar JS dikesan aktif
            setTimeout(() => {
                log.innerHTML += `<br>> Menyemak Subnet Mask...`;
                setTimeout(() => {
                    const ping = Math.floor(Math.random() * 100);
                    log.innerHTML = `
                        <span class="done">> Audit Selesai untuk ${ip}</span><br>
                        > Latensi: ${ping}ms<br>
                        > Status: Stabil<br>
                        > Node: Aktif
                    `;
                }, 1000);
            }, 800);
        }
    </script>

</body>
</html>
